<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Light Novel Audiobooks</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Novel Library View -->
    <div id="library-view" class="view active">
        <header>
            <h1>My Light Novels</h1>
            <button id="btn-request-novel" aria-label="Request new novel">+</button>
        </header>
        <div id="novel-list" class="content">
            <!-- Novel cards rendered by app.js -->
        </div>
    </div>

    <!-- Chapter List View -->
    <div id="chapters-view" class="view">
        <header>
            <button id="btn-back-library" aria-label="Back to library">&larr;</button>
            <h1 id="chapters-title">Novel Title</h1>
        </header>
        <div id="chapter-list" class="content">
            <!-- Chapter items rendered by app.js -->
        </div>
    </div>

    <!-- Request Novel Modal -->
    <div id="request-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Request New Novel</h2>
            <form id="request-form">
                <label for="novel-url">Novel URL</label>
                <input type="url" id="novel-url" placeholder="https://www.ttkan.co/..." required>
                <label for="novel-title">Title (optional)</label>
                <input type="text" id="novel-title" placeholder="Novel title">
                <div class="modal-actions">
                    <button type="button" id="btn-cancel-request">Cancel</button>
                    <button type="submit">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Audio Player (persistent bottom bar) -->
    <div id="player-bar" class="player-bar hidden">
        <div class="player-info">
            <span id="player-novel-title">Novel</span>
            <span id="player-chapter-title">Chapter</span>
        </div>
        <div class="player-progress">
            <input type="range" id="player-scrubber" min="0" max="100" value="0" step="0.1">
            <div class="player-times">
                <span id="player-current-time">0:00</span>
                <span id="player-duration">0:00</span>
            </div>
        </div>
        <div class="player-controls">
            <button id="btn-prev-chapter" aria-label="Previous chapter">&#9198;</button>
            <button id="btn-skip-back" aria-label="Skip back 15s">-15</button>
            <button id="btn-play-pause" aria-label="Play/Pause">&#9654;</button>
            <button id="btn-skip-forward" aria-label="Skip forward 15s">+15</button>
            <button id="btn-next-chapter" aria-label="Next chapter">&#9197;</button>
        </div>
        <div class="player-speed">
            <label for="speed-control">Speed:</label>
            <input type="range" id="speed-control" min="0.5" max="3.0" step="0.1" value="2.0">
            <span id="speed-display">2.0x</span>
        </div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audio-player" preload="auto"></audio>

    <script src="app.js"></script>
</body>
</html>
