<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Light Novel Audiobooks</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-layout">
    <!-- Novel Library View -->
    <div id="library-view" class="view active">
        <header>
            <h1>My Light Novels</h1>
            <div style="display: flex; gap: 0.5rem;">
                <button id="btn-sort-novels" class="btn-sort" aria-label="Sort novels" title="Sort novels"><span class="material-icons">swap_vert</span></button>
                <button id="btn-queue" class="btn-queue" aria-label="Processing queue" title="Processing queue"><span class="material-icons">queue_music</span></button>
                <button id="btn-settings" aria-label="Settings" title="Voice settings"><span class="material-icons">settings</span></button>
                <button id="btn-request-novel" aria-label="Request new novel"><span class="material-icons">add</span></button>
            </div>
        </header>
        <!-- Resume listening banner -->
        <div id="resume-banner" class="resume-banner hidden">
            <div class="resume-info">
                <span class="resume-label">Continue listening</span>
                <span id="resume-detail"></span>
            </div>
            <button id="btn-resume-listening">Resume</button>
            <button id="btn-dismiss-resume" aria-label="Dismiss"><span class="material-icons">close</span></button>
        </div>
        <div id="novel-list" class="content">
            <!-- Novel cards rendered by app.js -->
        </div>
    </div>

    <!-- Chapter List View -->
    <div id="chapters-view" class="view">
        <header class="chapters-header">
            <div class="chapters-header-row">
                <button id="btn-back-library" aria-label="Back to library"><span class="material-icons">arrow_back</span></button>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="btn-hide-read" class="btn-toggle-read" aria-label="Hide read chapters" title="Hide read chapters"><span class="material-icons">visibility</span></button>
                    <button id="btn-sort-chapters" class="btn-sort" aria-label="Sort chapters" title="Sort chapters"><span class="material-icons">swap_vert</span></button>
                    <button id="btn-pre-replace" aria-label="Chinese find and replace" title="Find &amp; replace (Chinese source)"><span class="material-icons">find_replace</span></button>
                    <button id="btn-post-replace" aria-label="English find and replace" title="Find &amp; replace (English / TTS)"><span class="material-icons">menu_book</span></button>
                    <button id="btn-rename-novel" aria-label="Rename novel" title="Rename novel"><span class="material-icons">edit</span></button>
                    <button id="btn-add-chapters" aria-label="Download more chapters" title="Download more chapters"><span class="material-icons">add</span></button>
                    <button id="btn-check-updates" aria-label="Check for new chapters" title="Check for new chapters"><span class="material-icons">refresh</span></button>
                </div>
            </div>
            <h1 id="chapters-title"><a id="chapters-title-link" href="#" target="_blank" rel="noopener">Novel Title</a></h1>
        </header>
        <div id="job-status" class="hidden">
            <!-- Active job progress rendered by app.js -->
        </div>
        <div id="chapter-list" class="content">
            <!-- Chapter items rendered by app.js -->
        </div>
    </div>

    <!-- Queue View -->
    <div id="queue-view" class="view">
        <header>
            <button id="btn-back-from-queue" aria-label="Back to library"><span class="material-icons">arrow_back</span></button>
            <h1>Processing Queue</h1>
        </header>
        <div id="queue-list" class="content">
            <!-- Queue items rendered by app.js -->
        </div>
    </div>

    <!-- Settings/Voice View -->
    <div id="settings-view" class="view">
        <header>
            <button id="btn-back-from-settings" aria-label="Back to library"><span class="material-icons">arrow_back</span></button>
            <h1>Voice Settings</h1>
        </header>
        <p id="current-voice-label" style="color: var(--text-secondary); margin-bottom: 1rem;"></p>
        <div id="voice-list" class="content">
            <!-- Voice cards rendered by app.js -->
        </div>
    </div>
    </div><!-- /app-layout -->

    <!-- Request Novel Modal -->
    <div id="request-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Request New Novel</h2>
            <form id="request-form">
                <label for="novel-url">Novel URL</label>
                <input type="url" id="novel-url" placeholder="https://funs.me/book/..." required>
                <label for="novel-title">Title (optional)</label>
                <input type="text" id="novel-title" placeholder="Novel title">
                <label for="novel-start-url">Starting chapter URL (optional)</label>
                <input type="url" id="novel-start-url" placeholder="Skip to a specific chapter">
                <label for="novel-max-chapters">Chapters to download</label>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="number" id="novel-max-chapters" min="1" placeholder="All" style="flex:1;">
                    <span style="color: var(--text-secondary); font-size: 0.85rem;">Leave blank for all</span>
                </div>
                <div class="modal-actions">
                    <button type="button" id="btn-cancel-request">Cancel</button>
                    <button type="submit">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Chapters Modal -->
    <div id="add-chapters-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Download More Chapters</h2>
            <form id="add-chapters-form">
                <label for="add-chapters-start-url">Starting chapter URL (optional)</label>
                <input type="url" id="add-chapters-start-url" placeholder="Continue from a specific chapter">
                <label for="add-chapters-count">How many more chapters?</label>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="number" id="add-chapters-count" min="1" placeholder="All remaining" style="flex:1;">
                    <span style="color: var(--text-secondary); font-size: 0.85rem;">Leave blank for all</span>
                </div>
                <div class="modal-actions">
                    <button type="button" id="btn-cancel-add-chapters">Cancel</button>
                    <button type="submit">Download</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Find/Replace Modal (shared by pre + post) -->
    <div id="replacements-modal" class="modal hidden">
        <div class="modal-content modal-content-wide">
            <h2 id="replacements-title">Find &amp; Replace</h2>
            <p id="replacements-help" class="modal-help"></p>
            <div class="replacements-table-wrap">
                <table class="replacements-table">
                    <thead>
                        <tr>
                            <th class="col-global" title="Apply to every novel">Global</th>
                            <th class="col-find">Find</th>
                            <th class="col-replace">Replace with</th>
                            <th class="col-actions"></th>
                        </tr>
                    </thead>
                    <tbody id="replacements-tbody">
                        <!-- Rows rendered by app.js -->
                    </tbody>
                </table>
                <button type="button" id="btn-add-replacement" class="btn-add-row" aria-label="Add row" title="Add row"><span class="material-icons">add_box</span></button>
            </div>
            <div id="phonetic-keyboard" class="phonetic-keyboard hidden">
                <!-- Buttons rendered by app.js -->
            </div>
            <div class="modal-actions">
                <button type="button" id="btn-close-replacements">Close</button>
            </div>
        </div>
    </div>

    <!-- Audio Player (persistent bottom bar) -->
    <div id="player-bar" class="player-bar hidden">
        <div class="player-info">
            <span id="player-novel-title">Novel</span>
            <span id="player-chapter-title">Chapter</span>
        </div>
        <div class="player-progress">
            <input type="range" id="player-scrubber" min="0" max="100" value="0" step="0.1">
            <div class="player-times">
                <span id="player-current-time">0:00</span>
                <span id="player-duration">0:00</span>
            </div>
        </div>
        <div class="player-controls">
            <button id="btn-prev-chapter" aria-label="Previous chapter"><span class="material-icons">skip_previous</span></button>
            <button id="btn-skip-back" aria-label="Skip back 15s"><span class="material-icons">replay_10</span></button>
            <button id="btn-play-pause" aria-label="Play/Pause"><span class="material-icons">play_arrow</span></button>
            <button id="btn-skip-forward" aria-label="Skip forward 15s"><span class="material-icons">forward_10</span></button>
            <button id="btn-next-chapter" aria-label="Next chapter"><span class="material-icons">skip_next</span></button>
        </div>
        <div class="player-speed">
            <label for="speed-control">Speed:</label>
            <input type="range" id="speed-control" min="0.5" max="3.0" step="0.1" value="1.0">
            <span id="speed-display">1.0x</span>
        </div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audio-player" preload="auto"></audio>

    <script src="sortable.min.js"></script>
    <script>
        if (typeof Sortable === "undefined") {
            console.warn("SortableJS not loaded from local file, trying CDN...");
            var s = document.createElement("script");
            s.src = "https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js";
            s.onload = function() { console.log("SortableJS loaded from CDN"); };
            s.onerror = function() { console.error("FATAL: SortableJS failed to load from CDN too"); };
            document.head.appendChild(s);
        } else {
            console.log("SortableJS v" + Sortable.version + " loaded");
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
